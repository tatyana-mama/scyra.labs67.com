<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#0D1626"/>
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0099CC"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0099CC" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="220" r="130" stroke="url(#ring-grad)" stroke-width="1.5" fill="none"/>

  <!-- Inner dot -->
  <circle cx="256" cy="220" r="8" fill="url(#cyan-grad)" opacity="0.9"/>

  <!-- Cross lines — dental/AI mark -->
  <line x1="256" y1="130" x2="256" y2="310" stroke="url(#cyan-grad)" stroke-width="1" opacity="0.25"/>
  <line x1="166" y1="220" x2="346" y2="220" stroke="url(#cyan-grad)" stroke-width="1" opacity="0.25"/>

  <!-- ŠČYRA wordmark -->
  <text x="256" y="248"
    font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="88" font-weight="800"
    letter-spacing="-3"
    text-anchor="middle">
    <tspan fill="#FFFFFF">ŠČYRA</tspan>
  </text>

  <!-- .AI accent -->
  <text x="256" y="310"
    font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="42" font-weight="700"
    letter-spacing="2"
    text-anchor="middle"
    fill="url(#cyan-grad)">
    .AI
  </text>

  <!-- DENTAL INTELLIGENCE subtitle -->
  <text x="256" y="390"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="18" font-weight="400"
    letter-spacing="5"
    fill="#4A5568"
    text-anchor="middle">
    DENTAL INTELLIGENCE
  </text>
</svg>
